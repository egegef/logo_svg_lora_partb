# Starting point for ms-swift / ModelScope LoRA training.
# Adjust model path after downloading Gemma 3 270M from ModelScope.

model: ./gemma3-270m
train_dataset: ./logo-detailed-prompt/train.jsonl
val_dataset: ./logo-detailed-prompt/valid.jsonl
output_dir: ./adapter

task_type: causal_lm
tuner_backend: peft
train_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

num_train_epochs: 6
learning_rate: 0.0001
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
max_length: 2048

eval_steps: 20
save_steps: 20
logging_steps: 5
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

seed: 42
bf16: true
gradient_checkpointing: true
mask_prompt: true
