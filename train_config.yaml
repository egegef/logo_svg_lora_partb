# LoRA training configuration used for the submitted adapter.
# The closure dataset is generated with student_kit/make_closure_dataset.py.

model: ./gemma3-270m
source_train_dataset: ./logo-detailed-prompt/train.jsonl
source_val_dataset: ./logo-detailed-prompt/valid.jsonl
train_dataset: ./closure_data/train_closure.jsonl
val_dataset: ./closure_data/valid_closure.jsonl
output_dir: ./adapter

task_type: causal_lm
tuner_backend: peft
train_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

num_train_epochs: 8
learning_rate: 0.0002
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
max_length: 1024

eval_steps: 20
save_steps: 20
logging_steps: 5
save_total_limit: 2
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false

seed: 43
bf16: true
gradient_checkpointing: true
mask_prompt: true

self_eval_dataset: ./logo-detailed-prompt/valid.jsonl
self_eval_max_new_tokens: 768
